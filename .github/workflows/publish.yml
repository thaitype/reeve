name: publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0). Must match Cargo.toml."
        required: true
      dry_run:
        description: "Dry-run only (skip cargo publish, skip release upload)"
        required: true
        default: true
        type: boolean

jobs:
  gate:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings

  publish:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify version matches input
        run: |
          cargo_version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="reeve") | .version')
          [ "$cargo_version" = "${{ inputs.version }}" ] || {
            echo "::error::Cargo.toml version $cargo_version != input ${{ inputs.version }}"
            exit 1
          }
      - run: cargo publish --dry-run -p reeve
      - if: ${{ inputs.dry_run == false }}
        run: cargo publish -p reeve
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-binaries:
    needs: publish
    if: ${{ inputs.dry_run == false }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,  target: aarch64-apple-darwin }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release -p reeve --target ${{ matrix.target }}
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/reeve dist/reeve-${{ inputs.version }}-${{ matrix.target }}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
